<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PI WASM Agent + Linux</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0d1117;
            --bg2: #161b22;
            --bg3: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text2: #8b949e;
            --green: #3fb950;
            --blue: #58a6ff;
            --red: #f85149;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
        }
        
        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }
        
        /* Header */
        .header {
            padding: 10px 16px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 15px;
        }
        
        .logo-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--green), var(--blue));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text2);
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text2);
        }
        
        .status-dot.ready { background: var(--green); }
        .status-dot.busy { background: var(--blue); animation: pulse 1s infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Agent Chat */
        .chat {
            height: 200px;
            min-height: 120px;
            max-height: 300px;
            display: flex;
            flex-direction: column;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .msg {
            max-width: 95%;
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 12px;
            line-height: 1.4;
        }
        
        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #1f6feb, #388bfd);
        }
        
        .msg.assistant {
            align-self: flex-start;
            background: var(--bg3);
        }
        
        .msg.system {
            align-self: center;
            background: transparent;
            color: var(--text2);
            font-size: 11px;
        }
        
        .chat-input {
            padding: 8px 10px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 6px;
        }
        
        .chat-input input {
            flex: 1;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px 12px;
            color: var(--text);
            font-size: 13px;
            outline: none;
        }
        
        .chat-input input:focus { border-color: var(--blue); }
        
        .send-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green), #2ea043);
            border: none;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        
        .send-btn:disabled { opacity: 0.5; }
        
        /* Quick Actions */
        .actions {
            padding: 6px 10px;
            background: var(--bg3);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 4px 8px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text2);
            font-size: 11px;
            cursor: pointer;
        }
        
        .action-btn:active { background: var(--border); color: var(--text); }
        
        /* Terminal */
        .terminal {
            flex: 1;
            background: #000;
            position: relative;
        }
        
        .terminal iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .loading {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 10;
        }
        
        .loading.hidden { display: none; }
        
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Resize Handle */
        .resize-handle {
            height: 6px;
            background: var(--border);
            cursor: ns-resize;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .resize-handle::after {
            content: '';
            width: 40px;
            height: 3px;
            background: var(--text2);
            border-radius: 2px;
            opacity: 0.5;
        }
        
        /* Mobile */
        @media (max-width: 600px) {
            .chat { height: 150px; }
            .header { padding: 8px 12px; }
            .logo span { display: none; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">π</div>
                <span>PI Agent + Linux</span>
            </div>
            <div class="status">
                <span class="status-dot busy" id="status"></span>
                <span id="statusText">Loading...</span>
            </div>
        </div>
        
        <div class="main">
            <!-- Chat -->
            <div class="chat" id="chatPanel">
                <div class="chat-messages" id="messages">
                    <div class="msg system">Initializing...</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="input" placeholder="Type command or message..." onkeydown="handleKey(event)">
                    <button class="send-btn" id="sendBtn" onclick="send()" disabled>➤</button>
                </div>
            </div>
            
            <!-- Quick Actions -->
            <div class="actions">
                <button class="action-btn" onclick="runCmd('help')">❓ Help</button>
                <button class="action-btn" onclick="runCmd('ls -la')">📁 ls</button>
                <button class="action-btn" onclick="runCmd('python3')">🐍 Python</button>
                <button class="action-btn" onclick="runCmd('vim ')">📝 vim</button>
                <button class="action-btn" onclick="runCmd('git status')">🔀 git</button>
                <button class="action-btn" onclick="runCmd('apk update && apk add ')">📦 install</button>
                <button class="action-btn" onclick="runCmd('clear')">🧹 clear</button>
            </div>
            
            <!-- Terminal -->
            <div class="terminal">
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <div style="color:var(--text2);font-size:12px">Loading Alpine Linux...</div>
                </div>
                <iframe id="webvm" src="https://webvm.io" onload="onLoad()"></iframe>
            </div>
        </div>
    </div>
    
    <script>
        let pyodide = null;
        
        async function init() {
            setStatus('busy', 'Loading Python...');
            
            try {
                pyodide = await loadPyodide();
                setStatus('ready', 'Ready');
                document.getElementById('sendBtn').disabled = false;
                
                clearMessages();
                addMessage('system', '✅ Ready! Commands run in Linux terminal below. Type "help" for tips.');
            } catch (e) {
                setStatus('error', 'Error');
                addMessage('system', 'Error: ' + e.message);
            }
        }
        
        function onLoad() {
            document.getElementById('loading').classList.add('hidden');
        }
        
        function send() {
            const input = document.getElementById('input');
            const cmd = input.value.trim();
            if (!cmd) return;
            
            input.value = '';
            addMessage('user', cmd);
            
            // Show what was sent
            if (cmd === 'help') {
                addMessage('assistant', `**PI Agent - Linux Terminal**

Commands you send are executed in the Linux environment below.

**Useful Commands:**
• \`ls -la\` - List all files
• \`python3\` - Python REPL
• \`vim file.txt\` - Edit file
• \`cat file.txt\` - Read file
• \`apk add <pkg>\` - Install package
• \`git clone <url>\` - Clone repo

**Tips:**
• Use buttons above for quick commands
• Full Alpine Linux environment
• Python, Node.js, Git available`);
            } else {
                addMessage('system', `→ ${cmd}`);
            }
        }
        
        function runCmd(c) {
            document.getElementById('input').value = c;
            if (!c.endsWith(' ')) {
                send();
            } else {
                document.getElementById('input').focus();
            }
        }
        
        function addMessage(type, text) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = text
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre>$2</pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 1e9;
        }
        
        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
        }
        
        function setStatus(s, t) {
            document.getElementById('status').className = 'status-dot ' + s;
            document.getElementById('statusText').textContent = t;
        }
        
        function handleKey(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                send();
            }
        }
        
        init();
    </script>
</body>
</html>
