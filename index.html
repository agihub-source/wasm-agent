<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 WASM Agent - Browser AI Assistant</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #4CAF50, #2196F3, #9C27B0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #888;
            font-size: 14px;
        }
        
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            font-size: 13px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }
        
        .status-dot.ready {
            background: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }
        
        .status-dot.loading {
            background: #2196F3;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .main-content {
            flex: 1;
            display: flex;
            gap: 20px;
            overflow: hidden;
        }
        
        .chat-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
        }
        
        .message.user {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .message.assistant {
            background: rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }
        
        .message.system {
            background: rgba(156, 39, 176, 0.2);
            border: 1px solid rgba(156, 39, 176, 0.3);
            font-size: 13px;
            max-width: 100%;
        }
        
        .message.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.3);
        }
        
        .message pre {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            font-size: 13px;
        }
        
        .message code {
            font-family: 'Fira Code', 'Monaco', monospace;
        }
        
        .input-area {
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 10px;
        }
        
        .input-area textarea {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 14px;
            resize: none;
            min-height: 50px;
            max-height: 150px;
        }
        
        .input-area textarea:focus {
            outline: none;
            border-color: #2196F3;
        }
        
        .input-area button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }
        
        .input-area button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        
        .tools-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .panel {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
        }
        
        .panel h3 {
            font-size: 14px;
            color: #4CAF50;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .api-config input {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .api-config select {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
        }
        
        .file-list {
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }
        
        .file-item {
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-item .delete-btn {
            background: none;
            border: none;
            color: #f44336;
            cursor: pointer;
            padding: 2px 8px;
        }
        
        .tool-log {
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 11px;
        }
        
        .log-entry {
            padding: 6px 10px;
            margin-bottom: 5px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            border-left: 3px solid #4CAF50;
        }
        
        .log-entry.error {
            border-left-color: #f44336;
        }
        
        .example-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .example-btn {
            padding: 6px 12px;
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid rgba(33, 150, 243, 0.3);
            border-radius: 15px;
            color: #2196F3;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .example-btn:hover {
            background: rgba(33, 150, 243, 0.3);
        }
        
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            
            .tools-panel {
                order: -1;
            }
            
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 WASM Agent</h1>
            <p class="subtitle">Browser-based AI Assistant powered by Python WebAssembly</p>
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-dot" id="pyodide-status"></span>
                    <span>Pyodide</span>
                </div>
                <div class="status-item">
                    <span class="status-dot" id="agent-status"></span>
                    <span>Agent</span>
                </div>
            </div>
        </header>
        
        <div class="main-content">
            <div class="chat-panel">
                <div class="chat-messages" id="messages">
                    <div class="message system">
                        Welcome to WASM Agent! Configure your API key and start chatting.
                    </div>
                </div>
                <div class="input-area">
                    <textarea id="user-input" placeholder="Ask me anything..." rows="2"></textarea>
                    <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
                </div>
                <div class="example-prompts">
                    <button class="example-btn" onclick="setPrompt('Write a Python function to calculate fibonacci')">📝 Fibonacci</button>
                    <button class="example-btn" onclick="setPrompt('Create a simple game')">🎮 Game</button>
                    <button class="example-btn" onclick="setPrompt('Analyze this data and visualize it')">📊 Analysis</button>
                    <button class="example-btn" onclick="setPrompt('Help me debug this code')">🐛 Debug</button>
                </div>
            </div>
            
            <div class="tools-panel">
                <div class="panel api-config">
                    <h3>⚙️ Configuration</h3>
                    <select id="api-provider">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="local">Local (Mock)</option>
                    </select>
                    <input type="password" id="api-key" placeholder="API Key (required for OpenAI/Anthropic)">
                    <input type="text" id="api-base" placeholder="API Base URL (optional)">
                </div>
                
                <div class="panel">
                    <h3>📁 Virtual Files</h3>
                    <div class="file-list" id="file-list"></div>
                </div>
                
                <div class="panel">
                    <h3>🔧 Tool Log</h3>
                    <div class="tool-log" id="tool-log"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let pyodide = null;
        let virtualFS = {};
        let toolLog = [];
        let conversationHistory = [];
        
        // Initialize Pyodide
        async function initPyodide() {
            setStatus('pyodide-status', 'loading');
            addMessage('system', 'Loading Python runtime (Pyodide)...');
            
            try {
                pyodide = await loadPyodide();
                
                // Load required packages
                await pyodide.loadPackage(['micropip']);
                
                // Initialize Agent
                await initAgent();
                
                setStatus('pyodide-status', 'ready');
                document.getElementById('send-btn').disabled = false;
                addMessage('system', '✅ Python runtime ready! Configure your API key and start chatting.');
            } catch (error) {
                setStatus('pyodide-status', 'error');
                addMessage('error', 'Failed to load Pyodide: ' + error.message);
            }
        }
        
        // Initialize Agent
        async function initAgent() {
            const agentCode = `
import json
import sys
from io import StringIO

# Virtual File System
class VirtualFS:
    def __init__(self):
        self.files = {}
    
    def write(self, path, content):
        self.files[path] = content
        return f"Wrote {len(content)} chars to {path}"
    
    def read(self, path):
        if path in self.files:
            return self.files[path]
        return f"Error: File {path} not found"
    
    def list(self):
        return list(self.files.keys())
    
    def delete(self, path):
        if path in self.files:
            del self.files[path]
            return f"Deleted {path}"
        return f"Error: File {path} not found"

fs = VirtualFS()

# Tool definitions
TOOLS = [
    {
        "name": "write_file",
        "description": "Write content to a file",
        "parameters": {
            "path": "File path",
            "content": "File content"
        }
    },
    {
        "name": "read_file", 
        "description": "Read content from a file",
        "parameters": {
            "path": "File path"
        }
    },
    {
        "name": "list_files",
        "description": "List all files",
        "parameters": {}
    },
    {
        "name": "run_python",
        "description": "Execute Python code",
        "parameters": {
            "code": "Python code to execute"
        }
    }
]

def execute_tool(name, params):
    """Execute a tool and return result"""
    result = ""
    
    if name == "write_file":
        result = fs.write(params.get("path", ""), params.get("content", ""))
    elif name == "read_file":
        result = fs.read(params.get("path", ""))
    elif name == "list_files":
        result = json.dumps(fs.list())
    elif name == "run_python":
        try:
            old_stdout = sys.stdout
            sys.stdout = StringIO()
            exec(params.get("code", ""))
            result = sys.stdout.getvalue()
            sys.stdout = old_stdout
        except Exception as e:
            result = f"Error: {str(e)}"
    else:
        result = f"Unknown tool: {name}"
    
    return result

def get_tools():
    return TOOLS

def get_fs():
    return fs.files

def clear_fs():
    fs.files = {}
`;
            
            await pyodide.runPythonAsync(agentCode);
        }
        
        // Send message
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            input.value = '';
            addMessage('user', message);
            setStatus('agent-status', 'loading');
            document.getElementById('send-btn').disabled = true;
            
            try {
                const response = await processMessage(message);
                addMessage('assistant', response);
            } catch (error) {
                addMessage('error', 'Error: ' + error.message);
            }
            
            setStatus('agent-status', 'ready');
            document.getElementById('send-btn').disabled = false;
            updateFileList();
        }
        
        // Process message with Agent
        async function processMessage(message) {
            const provider = document.getElementById('api-provider').value;
            const apiKey = document.getElementById('api-key').value;
            const apiBase = document.getElementById('api-base').value || null;
            
            if (provider === 'local') {
                // Local mock mode - simple responses
                return await mockAgent(message);
            }
            
            if (!apiKey) {
                return "Please configure your API key in the settings panel.";
            }
            
            // Real API call
            try {
                if (provider === 'openai') {
                    return await callOpenAI(message, apiKey, apiBase);
                } else if (provider === 'anthropic') {
                    return await callAnthropic(message, apiKey, apiBase);
                }
            } catch (error) {
                return `API Error: ${error.message}`;
            }
        }
        
        // Mock Agent (local mode)
        async function mockAgent(message) {
            addToolLog('agent', `Processing: ${message.substring(0, 50)}...`);
            
            const lowerMsg = message.toLowerCase();
            
            // Python code execution
            if (lowerMsg.includes('python') || lowerMsg.includes('code')) {
                const codeMatch = message.match(/```python\n([\s\S]*?)```/) || 
                                  message.match(/```([\s\S]*?)```/);
                
                if (codeMatch) {
                    const code = codeMatch[1];
                    addToolLog('run_python', code.substring(0, 100) + '...');
                    
                    const result = await pyodide.runPythonAsync(
                        `execute_tool("run_python", {"code": ${JSON.stringify(code)}})`
                    );
                    
                    addToolLog('result', result);
                    return `**Execution Result:**\n\`\`\`\n${result}\n\`\`\``;
                }
            }
            
            // File operations
            if (lowerMsg.includes('write') && lowerMsg.includes('file')) {
                const pathMatch = message.match(/to\s+([^\s]+)/);
                const path = pathMatch ? pathMatch[1] : 'output.txt';
                const content = message.replace(/.*(?:write|create|save)/i, '').trim();
                
                await pyodide.runPythonAsync(
                    `execute_tool("write_file", {"path": "${path}", "content": ${JSON.stringify(content)}})`
                );
                
                addToolLog('write_file', path);
                return `✅ Written to ${path}`;
            }
            
            if (lowerMsg.includes('list') && lowerMsg.includes('file')) {
                const files = await pyodide.runPythonAsync('json.dumps(get_fs())');
                addToolLog('list_files', files);
                return `**Files:**\n\`\`\`json\n${files}\n\`\`\``;
            }
            
            // Default response
            const tools = await pyodide.runPythonAsync('json.dumps(get_tools(), indent=2)');
            return `I'm a browser-based AI Agent running on Python WASM! 

**Available Tools:**
\`\`\`json
${tools}
\`\`\`

**Try:**
- "Write Python code to calculate fibonacci"
- "Create a file called hello.txt with content 'Hello World'"
- "List all files"

I can execute Python code directly in your browser!`;
        }
        
        // OpenAI API
        async function callOpenAI(message, apiKey, apiBase) {
            const tools = await pyodide.runPythonAsync('json.dumps(get_tools())');
            
            const response = await fetch((apiBase || 'https://api.openai.com/v1') + '/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'gpt-3.5-turbo',
                    messages: [
                        { role: 'system', content: 'You are a helpful AI assistant. You have access to tools for file operations and Python execution.' },
                        { role: 'user', content: message }
                    ],
                    tools: JSON.parse(tools)
                })
            });
            
            const data = await response.json();
            return data.choices[0].message.content;
        }
        
        // Anthropic API
        async function callAnthropic(message, apiKey, apiBase) {
            const response = await fetch((apiBase || 'https://api.anthropic.com/v1') + '/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                    model: 'claude-3-haiku-20240307',
                    max_tokens: 1024,
                    messages: [
                        { role: 'user', content: message }
                    ]
                })
            });
            
            const data = await response.json();
            return data.content[0].text;
        }
        
        // UI Helpers
        function addMessage(type, content) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = formatMessage(content);
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function formatMessage(content) {
            // Simple markdown-like formatting
            return content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code class="$1">$2</code></pre>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }
        
        function addToolLog(tool, message) {
            const logDiv = document.getElementById('tool-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<strong>${tool}:</strong> ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            toolLog.push({ tool, message, time: new Date() });
        }
        
        function setStatus(id, status) {
            const dot = document.getElementById(id);
            dot.className = 'status-dot ' + status;
        }
        
        function updateFileList() {
            const fileListDiv = document.getElementById('file-list');
            pyodide.runPythonAsync('json.dumps(get_fs())').then(filesJson => {
                const files = JSON.parse(filesJson);
                fileListDiv.innerHTML = Object.keys(files).map(path => `
                    <div class="file-item">
                        <span>📄 ${path}</span>
                        <button class="delete-btn" onclick="deleteFile('${path}')">✕</button>
                    </div>
                `).join('') || '<div style="color:#666;text-align:center;padding:20px">No files yet</div>';
            });
        }
        
        async function deleteFile(path) {
            await pyodide.runPythonAsync(`execute_tool("delete_file", {"path": "${path}"})`);
            updateFileList();
            addToolLog('delete', path);
        }
        
        function setPrompt(text) {
            document.getElementById('user-input').value = text;
        }
        
        // Initialize
        initPyodide();
        
        // Keyboard shortcut
        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
