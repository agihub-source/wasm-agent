<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WASM Agent</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-green: #3fb950;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
        }
        
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
        }
        
        /* Header */
        .header {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 16px;
        }
        
        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
        }
        
        .status-dot.ready {
            background: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
        }
        
        .status-dot.loading {
            background: var(--accent-blue);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .msg {
            max-width: 90%;
            padding: 12px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #1f6feb, #388bfd);
            border-bottom-right-radius: 4px;
        }
        
        .msg.assistant {
            align-self: flex-start;
            background: var(--bg-tertiary);
            border-bottom-left-radius: 4px;
        }
        
        .msg.system {
            align-self: center;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            text-align: center;
            max-width: 100%;
            padding: 8px;
        }
        
        .msg pre {
            background: var(--bg-primary);
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 12px;
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
        }
        
        .msg code {
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            background: var(--bg-primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }
        
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 14px;
        }
        
        .typing span {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1s infinite;
        }
        
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 100% { opacity: 0.4; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-3px); }
        }
        
        /* Input */
        .input-area {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }
        
        .input-container {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .input-wrapper {
            flex: 1;
            background: var(--bg-tertiary);
            border-radius: 20px;
            padding: 4px;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s;
        }
        
        .input-wrapper:focus-within {
            border-color: var(--accent-blue);
        }
        
        .input-wrapper textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            padding: 8px 12px;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            font-family: inherit;
        }
        
        .input-wrapper textarea::placeholder {
            color: var(--text-secondary);
        }
        
        .input-wrapper textarea:focus {
            outline: none;
        }
        
        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-green), #2ea043);
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .send-btn:active {
            transform: scale(0.92);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .quick-btn {
            flex-shrink: 0;
            padding: 6px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-btn:active {
            background: var(--border-color);
            color: var(--text-primary);
        }
        
        /* Settings Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: flex-end;
            z-index: 100;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: var(--bg-secondary);
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-height: 80vh;
            padding: 20px;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
        }
        
        .setting-group {
            margin-bottom: 20px;
        }
        
        .setting-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .setting-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .setting-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        
        .provider-btns {
            display: flex;
            gap: 8px;
        }
        
        .provider-btn {
            flex: 1;
            padding: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
        }
        
        .provider-btn.active {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: rgba(88, 166, 255, 0.1);
        }
        
        /* Files Panel */
        .files-panel {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 12px;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 13px;
        }
        
        .file-item:last-child {
            margin-bottom: 0;
        }
        
        .file-delete {
            background: none;
            border: none;
            color: #f85149;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 16px;
        }
        
        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <span>WASM Agent</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
                <span class="status-dot loading" id="status"></span>
                <button onclick="openSettings()" style="background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer">⚙️</button>
            </div>
        </header>
        
        <div class="messages" id="messages">
            <div class="msg system">Loading Python runtime...</div>
        </div>
        
        <div class="input-area">
            <div class="quick-actions">
                <button class="quick-btn" onclick="quickPrompt('fibonacci')">📝 Fibonacci</button>
                <button class="quick-btn" onclick="quickPrompt('sort')">🔢 Sort</button>
                <button class="quick-btn" onclick="quickPrompt('file')">📁 New File</button>
                <button class="quick-btn" onclick="quickPrompt('list')">📋 List Files</button>
            </div>
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="input" rows="1" placeholder="Ask anything..." onkeydown="handleKey(event)"></textarea>
                </div>
                <button class="send-btn" id="sendBtn" onclick="send()" disabled>➤</button>
            </div>
        </div>
    </div>
    
    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal" onclick="closeSettings(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span class="modal-title">Settings</span>
                <button class="modal-close" onclick="closeSettings()">✕</button>
            </div>
            
            <div class="setting-group">
                <div class="setting-label">Provider</div>
                <div class="provider-btns">
                    <button class="provider-btn active" id="providerLocal" onclick="setProvider('local')">Local</button>
                    <button class="provider-btn" id="providerOpenAI" onclick="setProvider('openai')">OpenAI</button>
                    <button class="provider-btn" id="providerAnthropic" onclick="setProvider('anthropic')">Anthropic</button>
                </div>
            </div>
            
            <div class="setting-group" id="apiKeyGroup" style="display:none">
                <div class="setting-label">API Key</div>
                <input type="password" class="setting-input" id="apiKey" placeholder="sk-...">
            </div>
            
            <div class="setting-group">
                <div class="setting-label">Virtual Files</div>
                <div class="files-panel" id="filesPanel">
                    <div class="empty-state">No files yet</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let pyodide = null;
        let provider = 'local';
        let isProcessing = false;
        
        const quickPrompts = {
            fibonacci: 'Write a Python function to calculate fibonacci numbers and show first 10',
            sort: 'Write a Python function to sort a list and demonstrate it',
            file: 'Create a file called hello.txt with content "Hello World!"',
            list: 'List all files in the virtual file system'
        };
        
        // Initialize
        async function init() {
            try {
                pyodide = await loadPyodide();
                await initAgent();
                
                document.getElementById('status').className = 'status-dot ready';
                document.getElementById('sendBtn').disabled = false;
                
                clearMessages();
                addMessage('system', 'Ready! I can execute Python code and manage files.');
            } catch (e) {
                addMessage('system', 'Error: ' + e.message);
            }
        }
        
        async function initAgent() {
            await pyodide.runPythonAsync(`
import json
import sys
from io import StringIO

class FS:
    def __init__(self):
        self.files = {}
    def write(self, p, c):
        self.files[p] = c
        return f"Wrote {len(c)} chars to {p}"
    def read(self, p):
        return self.files.get(p, f"File not found: {p}")
    def list(self):
        return list(self.files.keys())
    def delete(self, p):
        if p in self.files:
            del self.files[p]
            return f"Deleted {p}"
        return f"Not found: {p}"

fs = FS()

def run_tool(name, args):
    if name == "write_file":
        return fs.write(args.get("path",""), args.get("content",""))
    elif name == "read_file":
        return fs.read(args.get("path",""))
    elif name == "list_files":
        return json.dumps(fs.list())
    elif name == "run_python":
        try:
            old = sys.stdout
            sys.stdout = StringIO()
            exec(args.get("code",""))
            r = sys.stdout.getvalue()
            sys.stdout = old
            return r or "(no output)"
        except Exception as e:
            return f"Error: {e}"
    return f"Unknown: {name}"

def get_files():
    return fs.files
`);
        }
        
        // UI Functions
        function addMessage(type, text) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = formatText(text);
            document.getElementById('messages').appendChild(div);
            scrollToBottom();
        }
        
        function addTyping() {
            const div = document.createElement('div');
            div.className = 'msg assistant typing';
            div.id = 'typing';
            div.innerHTML = '<span></span><span></span><span></span>';
            document.getElementById('messages').appendChild(div);
            scrollToBottom();
        }
        
        function removeTyping() {
            const t = document.getElementById('typing');
            if (t) t.remove();
        }
        
        function formatText(text) {
            return text
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre>$2</pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }
        
        function scrollToBottom() {
            const m = document.getElementById('messages');
            m.scrollTop = m.scrollHeight;
        }
        
        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
        }
        
        // Send
        async function send() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text || isProcessing) return;
            
            input.value = '';
            input.style.height = 'auto';
            
            addMessage('user', text);
            isProcessing = true;
            document.getElementById('sendBtn').disabled = true;
            addTyping();
            
            try {
                const response = await processMessage(text);
                removeTyping();
                addMessage('assistant', response);
            } catch (e) {
                removeTyping();
                addMessage('assistant', 'Error: ' + e.message);
            }
            
            isProcessing = false;
            document.getElementById('sendBtn').disabled = false;
            updateFiles();
        }
        
        async function processMessage(msg) {
            const lower = msg.toLowerCase();
            
            // Python code
            const codeMatch = msg.match(/```python\n?([\s\S]*?)```/) || msg.match(/```([\s\S]*?)```/);
            if (codeMatch) {
                return await runPython(codeMatch[1]);
            }
            
            // File operations
            if (lower.includes('create') && lower.includes('file')) {
                const pMatch = msg.match(/called?\s+(\S+)/i) || msg.match(/(\S+\.txt)/i);
                const path = pMatch ? pMatch[1] : 'file.txt';
                const cMatch = msg.match(/content\s+["'](.+?)["']/i) || msg.match(/["'](.+?)["']/);
                const content = cMatch ? cMatch[1] : 'Hello World';
                return await runTool('write_file', {path, content});
            }
            
            if (lower.includes('list') && lower.includes('file')) {
                const files = await runTool('list_files', {});
                return files === '[]' ? 'No files yet' : `Files:\n${files}`;
            }
            
            if (lower.includes('fibonacci')) {
                return await runPython(`
def fib(n):
    if n <= 1: return n
    return fib(n-1) + fib(n-2)

print("Fibonacci sequence:")
for i in range(10):
    print(f"fib({i}) = {fib(i)}")
`);
            }
            
            if (lower.includes('sort')) {
                return await runPython(`
import random
nums = [random.randint(1, 100) for _ in range(10)]
print(f"Original: {nums}")
print(f"Sorted:   {sorted(nums)}")
`);
            }
            
            // Default
            return `I'm a browser-based AI agent running Python WASM!

**What I can do:**
• Execute Python code
• Create and read files
• Run calculations

**Try asking:**
• "Write a Python function to..."
• "Create a file called..."
• "List all files"`;
        }
        
        async function runPython(code) {
            return await pyodide.runPythonAsync(
                `run_tool("run_python", {"code": ${JSON.stringify(code)}})`
            );
        }
        
        async function runTool(name, args) {
            return await pyodide.runPythonAsync(
                `run_tool("${name}", ${JSON.stringify(args)})`
            );
        }
        
        async function updateFiles() {
            const files = await pyodide.runPythonAsync('json.dumps(get_files())');
            const obj = JSON.parse(files);
            const panel = document.getElementById('filesPanel');
            
            if (Object.keys(obj).length === 0) {
                panel.innerHTML = '<div class="empty-state">No files yet</div>';
            } else {
                panel.innerHTML = Object.entries(obj).map(([path, content]) => `
                    <div class="file-item">
                        <span>📄 ${path}</span>
                        <button class="file-delete" onclick="deleteFile('${path}')">🗑</button>
                    </div>
                `).join('');
            }
        }
        
        async function deleteFile(path) {
            await runTool('delete', {path});
            updateFiles();
        }
        
        // Settings
        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
            updateFiles();
        }
        
        function closeSettings(e) {
            if (!e || e.target.id === 'settingsModal') {
                document.getElementById('settingsModal').classList.remove('active');
            }
        }
        
        function setProvider(p) {
            provider = p;
            document.querySelectorAll('.provider-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('provider' + p.charAt(0).toUpperCase() + p.slice(1)).classList.add('active');
            document.getElementById('apiKeyGroup').style.display = p === 'local' ? 'none' : 'block';
        }
        
        function quickPrompt(key) {
            document.getElementById('input').value = quickPrompts[key];
        }
        
        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        }
        
        // Auto-resize textarea
        const textarea = document.getElementById('input');
        textarea.addEventListener('input', () => {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        });
        
        // Init
        init();
    </script>
</body>
</html>
