<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PI WASM Agent + Linux</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --green: #3fb950;
            --blue: #58a6ff;
            --purple: #a371f7;
            --red: #f85149;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
        }
        
        .app {
            display: flex;
            height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 16px;
        }
        
        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--green), var(--blue));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
        }
        
        .status {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
        }
        
        .status-dot.ready { background: var(--green); }
        .status-dot.loading { background: var(--blue); animation: pulse 1s infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
        }
        
        .tab.active {
            color: var(--text);
            border-bottom-color: var(--blue);
        }
        
        /* Panels */
        .panel {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        
        .files-list {
            font-size: 12px;
        }
        
        .file-item {
            padding: 8px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-icon { margin-right: 8px; }
        
        .tools-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .tool-card {
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tool-card:hover {
            border-color: var(--blue);
        }
        
        .tool-card h4 {
            font-size: 13px;
            margin-bottom: 4px;
        }
        
        .tool-card p {
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        /* Chat */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #1f6feb, #388bfd);
        }
        
        .msg.assistant {
            align-self: flex-start;
            background: var(--bg-tertiary);
        }
        
        .msg.system {
            align-self: center;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
        }
        
        .msg pre {
            background: var(--bg-primary);
            padding: 8px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 6px 0;
            font-size: 12px;
        }
        
        /* Tool Call */
        .tool-call {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin: 8px 0;
            overflow: hidden;
        }
        
        .tool-header {
            padding: 8px 12px;
            background: rgba(88, 166, 255, 0.1);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .tool-name { color: var(--blue); font-weight: 600; }
        
        .tool-body {
            padding: 8px 12px;
            font-size: 12px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 150px;
            overflow-y: auto;
        }
        
        /* Input */
        .input-area {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }
        
        .input-container {
            display: flex;
            gap: 8px;
        }
        
        .input-wrapper {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 4px;
        }
        
        .input-wrapper:focus-within { border-color: var(--blue); }
        
        .input-wrapper textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 14px;
            padding: 6px 12px;
            resize: none;
            font-family: inherit;
        }
        
        .input-wrapper textarea:focus { outline: none; }
        
        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green), #2ea043);
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        
        .send-btn:disabled { opacity: 0.5; }
        
        /* Linux Terminal */
        .linux-panel {
            display: none;
            flex: 1;
            flex-direction: column;
        }
        
        .linux-panel.active { display: flex; }
        
        .terminal-container {
            flex: 1;
            background: #000;
            position: relative;
        }
        
        .terminal-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            padding: 4px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-bottom: 12px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 6px;
            text-align: center;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
            color: var(--text-secondary);
        }
        
        .mode-btn.active {
            background: var(--bg-secondary);
            color: var(--text);
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .app {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">π</div>
                    <span>PI Agent</span>
                </div>
                <div class="status">
                    <span class="status-dot" id="status"></span>
                    <span id="statusText">Loading...</span>
                </div>
            </div>
            
            <div class="tabs">
                <div class="tab active" onclick="showPanel('files')">📁 Files</div>
                <div class="tab" onclick="showPanel('tools')">🔧 Tools</div>
            </div>
            
            <div class="panel" id="filesPanel">
                <div class="files-list" id="filesList">
                    <div style="color:var(--text-secondary);text-align:center;padding:20px">
                        No files yet
                    </div>
                </div>
            </div>
            
            <div class="panel" id="toolsPanel" style="display:none">
                <div class="tools-grid">
                    <div class="tool-card" onclick="insertCommand('read ')">
                        <h4>📄 Read</h4>
                        <p>Read file contents</p>
                    </div>
                    <div class="tool-card" onclick="insertCommand('write ')">
                        <h4>✏️ Write</h4>
                        <p>Create/overwrite file</p>
                    </div>
                    <div class="tool-card" onclick="insertCommand('edit ')">
                        <h4>🔧 Edit</h4>
                        <p>Modify file content</p>
                    </div>
                    <div class="tool-card" onclick="insertCommand('!')">
                        <h4>💻 Bash</h4>
                        <p>Run shell command</p>
                    </div>
                    <div class="tool-card" onclick="insertCommand('python:\\n```python\\n\\n```')">
                        <h4>🐍 Python</h4>
                        <p>Execute Python code</p>
                    </div>
                    <div class="tool-card" onclick="toggleLinux()">
                        <h4>🐧 Linux</h4>
                        <p>Full Linux terminal</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main">
            <!-- Mode Toggle -->
            <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
                <div class="mode-toggle">
                    <div class="mode-btn active" id="chatMode" onclick="setMode('chat')">💬 Chat</div>
                    <div class="mode-btn" id="linuxMode" onclick="setMode('linux')">🐧 Linux</div>
                </div>
            </div>
            
            <!-- Chat Mode -->
            <div class="chat-container" id="chatContainer">
                <div class="messages" id="messages">
                    <div class="msg system">Loading Python runtime...</div>
                </div>
                
                <div class="input-area">
                    <div class="input-container">
                        <div class="input-wrapper">
                            <textarea id="input" rows="1" placeholder="Message PI Agent..." onkeydown="handleKey(event)"></textarea>
                        </div>
                        <button class="send-btn" id="sendBtn" onclick="send()" disabled>➤</button>
                    </div>
                </div>
            </div>
            
            <!-- Linux Mode -->
            <div class="linux-panel" id="linuxPanel">
                <div class="terminal-container">
                    <iframe src="https://webvm.io" id="webvmFrame"></iframe>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let pyodide = null;
        let mode = 'chat';
        let isThinking = false;
        
        // Initialize
        async function init() {
            setStatus('loading', 'Loading Python...');
            
            try {
                pyodide = await loadPyodide();
                await initAgent();
                
                setStatus('ready', 'Ready');
                document.getElementById('sendBtn').disabled = false;
                
                clearMessages();
                addMessage('system', 'PI WASM Agent ready! Type "help" for commands, or switch to Linux mode for a full terminal.');
            } catch (e) {
                setStatus('error', 'Error');
                addMessage('system', 'Failed: ' + e.message);
            }
        }
        
        async function initAgent() {
            await pyodide.runPythonAsync(`
import json
import sys
from io import StringIO
from typing import Dict, List, Optional
from dataclasses import dataclass

@dataclass
class Result:
    success: bool
    output: str
    error: Optional[str] = None

class FS:
    def __init__(self):
        self.files: Dict[str, str] = {}
    
    def read(self, path: str) -> Result:
        if path in self.files:
            return Result(True, self.files[path])
        return Result(False, "", f"Not found: {path}")
    
    def write(self, path: str, content: str) -> Result:
        self.files[path] = content
        return Result(True, f"Wrote {len(content)} chars to {path}")
    
    def edit(self, path: str, old: str, new: str) -> Result:
        if path not in self.files:
            return Result(False, "", f"Not found: {path}")
        if old not in self.files[path]:
            return Result(False, "", f"Pattern not found")
        self.files[path] = self.files[path].replace(old, new)
        return Result(True, "Edited")
    
    def list(self) -> List[str]:
        return list(self.files.keys())

class Bash:
    def __init__(self, fs: FS):
        self.fs = fs
    
    def run(self, cmd: str) -> Result:
        parts = cmd.strip().split()
        if not parts:
            return Result(True, "")
        
        if parts[0] == "ls":
            files = self.fs.list()
            return Result(True, "\\n".join(files) if files else "(empty)")
        elif parts[0] == "cat":
            if len(parts) < 2:
                return Result(False, "", "Usage: cat <file>")
            return self.fs.read(parts[1])
        elif parts[0] == "echo":
            return Result(True, " ".join(parts[1:]))
        elif parts[0] == "pwd":
            return Result(True, "/home/user")
        elif parts[0] in ("python", "python3"):
            if "-c" in parts:
                idx = parts.index("-c")
                code = " ".join(parts[idx+1:])
                old = sys.stdout
                sys.stdout = StringIO()
                try:
                    exec(code)
                    out = sys.stdout.getvalue()
                    sys.stdout = old
                    return Result(True, out)
                except Exception as e:
                    sys.stdout = old
                    return Result(False, "", str(e))
            return Result(False, "", "Use -c for inline code")
        else:
            return Result(False, "", f"Command not found: {parts[0]}\\nTip: Switch to Linux mode for full terminal!")

fs = FS()
bash = Bash(fs)

def exec_tool(name: str, args: dict) -> dict:
    if name == "read":
        r = fs.read(args.get("path",""))
        return {"success": r.success, "output": r.output, "error": r.error}
    elif name == "write":
        r = fs.write(args.get("path",""), args.get("content",""))
        return {"success": r.success, "output": r.output, "error": r.error}
    elif name == "edit":
        r = fs.edit(args.get("path",""), args.get("old",""), args.get("new",""))
        return {"success": r.success, "output": r.output, "error": r.error}
    elif name == "bash":
        r = bash.run(args.get("command",""))
        return {"success": r.success, "output": r.output, "error": r.error}
    return {"success": False, "error": f"Unknown: {name}"}

def get_files():
    return fs.files
`);
        }
        
        async function execTool(name, args) {
            const result = await pyodide.runPythonAsync(
                `json.dumps(exec_tool("${name}", ${JSON.stringify(args)}))`
            );
            return JSON.parse(result);
        }
        
        async function send() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text || isThinking) return;
            
            input.value = '';
            addMessage('user', text);
            
            isThinking = true;
            setStatus('loading', 'Thinking...');
            document.getElementById('sendBtn').disabled = true;
            
            try {
                const response = await processMessage(text);
                addMessage('assistant', response);
            } catch (e) {
                addMessage('assistant', 'Error: ' + e.message);
            }
            
            isThinking = false;
            setStatus('ready', 'Ready');
            document.getElementById('sendBtn').disabled = false;
            updateFiles();
        }
        
        async function processMessage(msg) {
            const lower = msg.toLowerCase();
            
            // Help
            if (lower === 'help') {
                return `**PI WASM Agent Commands**

**File Operations:**
• \`read <path>\` - Read file
• \`write <path> <content>\` - Write file
• \`edit <path> "old" "new"\` - Edit file
• \`ls\` or \`list files\` - List files

**Bash Commands:**
• \`!<command>\` - Run bash command
• \`!ls\`, \`!cat <file>\`, \`!echo <text>\`

**Python:**
• \`\`\`python\\ncode here\\n\`\`\`

**Linux Mode:**
• Click "🐧 Linux" tab for full Linux terminal (WebVM)
• Or type \`linux\` to switch modes

**Examples:**
• \`write hello.py print("Hello!")\`
• \`!python -c "print(1+1)"\`
• \`read hello.py\``;
            }
            
            // Switch to Linux
            if (lower === 'linux') {
                setMode('linux');
                return 'Switched to Linux mode! You now have access to a full Linux terminal.';
            }
            
            // Read
            if (lower.startsWith('read ') || lower.startsWith('cat ')) {
                const path = msg.split(/\s+/)[1];
                const r = await execTool('read', {path});
                return formatResult('read', {path}, r);
            }
            
            // Write
            if (lower.startsWith('write ')) {
                const m = msg.match(/write\s+(\S+)\s+(.+)/is);
                if (m) {
                    const r = await execTool('write', {path: m[1], content: m[2]});
                    return formatResult('write', {path: m[1]}, r);
                }
            }
            
            // Create file
            if (lower.includes('create') && lower.includes('file')) {
                const p = msg.match(/called?\s+(\S+)/i);
                const c = msg.match(/content\s+["'](.+?)["']/i) || msg.match(/["'](.+?)["']/);
                const path = p ? p[1] : 'file.txt';
                const content = c ? c[1] : '';
                const r = await execTool('write', {path, content});
                return formatResult('write', {path}, r);
            }
            
            // Edit
            if (lower.startsWith('edit ')) {
                const m = msg.match(/edit\s+(\S+)\s+["'](.+?)["']\s+["'](.+?)["']/is);
                if (m) {
                    const r = await execTool('edit', {path: m[1], old: m[2], new: m[3]});
                    return formatResult('edit', {path: m[1]}, r);
                }
                return 'Usage: edit <path> "old text" "new text"';
            }
            
            // Bash
            if (msg.startsWith('!') || lower.startsWith('bash ')) {
                const cmd = msg.startsWith('!') ? msg.slice(1) : msg.slice(5);
                const r = await execTool('bash', {command: cmd});
                if (!r.success && r.error && r.error.includes('not found')) {
                    r.error += '\n\n💡 Tip: Switch to Linux mode for full terminal access!';
                }
                return formatResult('bash', {command: cmd}, r);
            }
            
            // List files
            if (lower.includes('list') && lower.includes('file')) {
                const r = await execTool('bash', {command: 'ls'});
                return formatResult('bash', {command: 'ls'}, r);
            }
            
            // Python code
            const code = msg.match(/```(?:python)?\n?([\s\S]*?)```/);
            if (code) {
                const r = await execTool('bash', {command: `python -c "${code[1].replace(/"/g, '\\"')}"`});
                return formatResult('bash', {command: 'python'}, r);
            }
            
            // Default
            return `I'm PI WASM Agent! Type \`help\` for commands.

**Quick Start:**
• \`write test.py print("Hello!")\` - Create a file
• \`!python -c "print(1+1)"\` - Run Python
• \`linux\` - Switch to full Linux terminal`;
        }
        
        function formatResult(tool, args, r) {
            let out = `<div class="tool-call"><div class="tool-header">`;
            out += `<span class="tool-name">${tool}</span>`;
            if (args.path) out += ` → ${args.path}`;
            if (args.command) out += ` → ${args.command}`;
            out += `</div><div class="tool-body">`;
            out += r.success ? (r.output || '(no output)') : `<span style="color:var(--red)">${r.error}</span>`;
            out += `</div></div>`;
            return out;
        }
        
        // UI Functions
        function addMessage(type, content) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = content
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre>$2</pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 1e9;
        }
        
        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
        }
        
        function setStatus(s, t) {
            document.getElementById('status').className = 'status-dot ' + s;
            document.getElementById('statusText').textContent = t;
        }
        
        async function updateFiles() {
            const files = await pyodide.runPythonAsync('json.dumps(get_files())');
            const obj = JSON.parse(files);
            const list = document.getElementById('filesList');
            list.innerHTML = Object.keys(obj).length === 0 
                ? '<div style="color:var(--text-secondary);text-align:center;padding:20px">No files yet</div>'
                : Object.keys(obj).map(p => `<div class="file-item"><span><span class="file-icon">📄</span>${p}</span></div>`).join('');
        }
        
        function showPanel(p) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.querySelector(`.tab:nth-child(${p === 'files' ? 1 : 2})`).classList.add('active');
            document.getElementById(p + 'Panel').style.display = 'block';
        }
        
        function setMode(m) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(m + 'Mode').classList.add('active');
            
            document.getElementById('chatContainer').style.display = m === 'chat' ? 'flex' : 'none';
            document.getElementById('linuxPanel').classList.toggle('active', m === 'linux');
        }
        
        function toggleLinux() {
            setMode(mode === 'linux' ? 'chat' : 'linux');
        }
        
        function insertCommand(cmd) {
            document.getElementById('input').value = cmd;
            document.getElementById('input').focus();
        }
        
        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        }
        
        // Init
        init();
    </script>
</body>
</html>
